version: 1

server:
  listen: "0.0.0.0:8787"
  data_dir: /data

input:
  path: field
  # Optional SRT publish passphrase. Leave empty for streamid-only ingest.
  srt_publish_passphrase: ""
  # Recommended Magewell Mini / SRT caller latency buffer (ms). Omit to leave unset.
  srt_latency_ms: 3000

mediamtx:
  binary: /usr/local/bin/mediamtx
  config_path: /data/mediamtx.yml
  api_url: http://127.0.0.1:8797
  rtsp_url: rtsp://127.0.0.1:8854

recording:
  enabled: true
  path: /data/recordings
  segment_template: "%path/%Y-%m-%d_%H-%M-%S"
  format: fmp4
  segment_duration: 1h
  delete_after: 0s

outputs:
  - id: youtube
    label: YouTube
    url: rtmp://a.rtmp.youtube.com/live2
    stream_key: REPLACE_ME
    enabled: false
  - id: gamechanger
    label: GameChanger
    url: rtmps://live.example.com/app
    stream_key: REPLACE_ME
    enabled: false
