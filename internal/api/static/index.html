<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>streamfork</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a3140;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #4f8cff;
      --accent-dim: #2f5db8;
      --ok: #3ecf8e;
      --warn: #f5b942;
      --bad: #f07178;
      --idle: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #171c26 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 1.75rem;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.75rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      gap: 1rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
    }

    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      align-items: center;
    }

    .input-srt-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      align-items: center;
    }

    .input-layout {
      display: grid;
      gap: 1rem;
    }

    .input-details {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    @media (min-width: 560px) {
      .input-layout {
        grid-template-columns: 220px 1fr;
        align-items: start;
      }
    }

    .input-preview {
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
    }

    .input-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .input-preview:not(.has-image) img {
      display: none;
    }

    .input-preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-preview.has-image .input-preview-placeholder {
      display: none;
    }

    .input-preview.offline.has-image img {
      opacity: 0.35;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: var(--idle);
    }

    .pill.online .dot { background: var(--ok); box-shadow: 0 0 8px rgba(62, 207, 142, 0.65); }
    .pill.offline .dot { background: var(--bad); }
    .pill.live .dot { background: var(--ok); box-shadow: 0 0 8px rgba(62, 207, 142, 0.65); }
    .pill.connecting .dot,
    .pill.reconnecting .dot { background: var(--warn); }
    .pill.failed .dot { background: var(--bad); }
    .pill.stopped .dot,
    .pill.idle .dot { background: var(--idle); }

    .stat {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stat strong {
      color: var(--text);
      font-weight: 600;
    }

    .bitrate-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .srt-buffer-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .srt-buffer-bar {
      display: inline-block;
      width: 3.5rem;
      height: 0.35rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      flex-shrink: 0;
    }

    .srt-buffer-fill {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--ok);
      transition: width 0.35s ease, background-color 0.35s ease;
    }

    .srt-buffer-fill.low { background: var(--warn); }
    .srt-buffer-fill.high { background: var(--bad); }

    .sparkline {
      display: inline-block;
      vertical-align: middle;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .sparkline polyline {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sparkline .sparkline-fill {
      fill: rgba(79, 140, 255, 0.12);
      stroke: none;
    }

    .sparkline .sparkline-baseline {
      stroke: var(--border);
      stroke-width: 1;
    }

    .outputs {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.75rem;
    }

    .output {
      display: grid;
      gap: 0.75rem;
      padding: 0.95rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
    }

    .output-header {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      justify-content: space-between;
    }

    .output-info {
      min-width: 0;
    }

    .output-title {
      margin: 0 0 0.2rem;
      font-size: 1rem;
      font-weight: 600;
    }

    .output-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.85rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .output-error {
      margin-top: 0.35rem;
      color: var(--bad);
      font-size: 0.82rem;
      word-break: break-word;
    }

    .output-fields {
      display: grid;
      gap: 0.65rem;
    }

    .field label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.2);
    }

    .field input:disabled {
      opacity: 0.55;
    }

    .field-key-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .field-key-row input {
      flex: 1;
      min-width: 0;
    }

    .btn-small {
      padding: 0.55rem 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .output-actions {
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(79, 140, 255, 0.12);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .toggle {
      position: relative;
      width: 3.1rem;
      height: 1.75rem;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #2d3444;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.15s ease;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(1.35rem);
    }

    .toggle input:disabled + .toggle-track {
      opacity: 0.45;
      cursor: wait;
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.5rem 0;
    }

    .footer {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: right;
    }

    .error-banner {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: rgba(240, 113, 120, 0.12);
      border: 1px solid rgba(240, 113, 120, 0.35);
      color: #ffb4ba;
      font-size: 0.9rem;
    }

    .error-banner.visible { display: block; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>streamfork</h1>
      <p class="subtitle">Configure and enable RTMP output streams.</p>
    </header>

    <div id="error" class="error-banner" role="alert"></div>

    <div class="cards">
      <section class="card">
        <h2>Input</h2>
        <div class="input-layout">
          <div id="input-preview" class="input-preview offline">
            <img id="input-snapshot" alt="" decoding="async">
            <div id="input-preview-placeholder" class="input-preview-placeholder">Unavailable</div>
          </div>
          <div class="input-details">
            <div class="input-row">
              <span id="input-status" class="pill offline"><span class="dot"></span><span>Offline</span></span>
              <span id="input-protocol" class="stat">Protocol: <strong>—</strong></span>
              <span id="input-source" class="stat">Source: <strong>—</strong></span>
              <span id="input-resolution" class="stat">Resolution: <strong>—</strong></span>
              <span id="input-fps" class="stat">Framerate: <strong>—</strong></span>
              <span id="input-bitrate" class="stat bitrate-stat">
                Bitrate: <strong>—</strong>
                <svg id="input-bitrate-sparkline" class="sparkline" width="88" height="22" viewBox="0 0 88 22" aria-hidden="true"></svg>
              </span>
              <span id="input-rtt" class="stat">RTT: <strong>—</strong></span>
            </div>
            <div id="input-srt-row" class="input-srt-row" hidden>
              <span id="input-srt-buffer" class="stat srt-buffer-stat">
                SRT buffer: <strong>—</strong>
                <span class="srt-buffer-bar" aria-hidden="true"><span id="input-srt-buffer-fill" class="srt-buffer-fill"></span></span>
              </span>
              <span id="input-srt-packets" class="stat">SRT packets (60s): <strong>—</strong></span>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Outputs</h2>
        <ul id="outputs" class="outputs">
          <li class="empty">Loading…</li>
        </ul>
      </section>
    </div>

    <p id="updated" class="footer">Updating…</p>
  </main>

  <script>
    const outputsEl = document.getElementById("outputs");
    const errorEl = document.getElementById("error");
    const updatedEl = document.getElementById("updated");
    const inputStatusEl = document.getElementById("input-status");
    const inputProtocolEl = document.getElementById("input-protocol");
    const inputSourceEl = document.getElementById("input-source");
    const inputResolutionEl = document.getElementById("input-resolution");
    const inputFpsEl = document.getElementById("input-fps");
    const inputBitrateEl = document.getElementById("input-bitrate");
    const inputBitrateSparklineEl = document.getElementById("input-bitrate-sparkline");
    const inputRttEl = document.getElementById("input-rtt");
    const inputSrtRowEl = document.getElementById("input-srt-row");
    const inputSrtBufferEl = document.getElementById("input-srt-buffer");
    const inputSrtBufferFillEl = document.getElementById("input-srt-buffer-fill");
    const inputSrtPacketsEl = document.getElementById("input-srt-packets");
    const inputPreviewEl = document.getElementById("input-preview");
    const inputSnapshotEl = document.getElementById("input-snapshot");
    const inputPreviewPlaceholderEl = document.getElementById("input-preview-placeholder");
    let snapshotVersion = 0;

    const pending = new Set();
    const editing = new Set();
    const visibleKeys = new Set();
    const drafts = {};
    let outputConfigs = {};
    let statusById = {};

    const BITRATE_WINDOW_MS = 60_000;
    const bitrateSamples = [];
    const outputBitrateSamples = {};
    const srtPacketSamples = [];
    let lastInboundBytes = null;
    let lastInboundAt = null;
    let lastSrtPackets = null;
    let lastInput = null;

    function pruneSamples(samples, now = Date.now()) {
      const cutoff = now - BITRATE_WINDOW_MS;
      while (samples.length > 0 && samples[0].t < cutoff) {
        samples.shift();
      }
    }

    function renderSparkline(svgEl, samples, now = Date.now()) {
      const width = 88;
      const height = 22;
      const padX = 1;
      const padY = 2;
      const cutoff = now - BITRATE_WINDOW_MS;
      const visible = samples.filter((sample) => sample.t >= cutoff);

      if (visible.length < 2) {
        svgEl.innerHTML =
          `<line class="sparkline-baseline" x1="${padX}" y1="${height / 2}" x2="${width - padX}" y2="${height / 2}" />`;
        svgEl.removeAttribute("title");
        return;
      }

      const values = visible.map((sample) => sample.v);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const plotWidth = width - padX * 2;
      const plotHeight = height - padY * 2;

      const points = visible.map((sample) => {
        const x = padX + ((sample.t - cutoff) / BITRATE_WINDOW_MS) * plotWidth;
        const y = padY + (1 - (sample.v - min) / range) * plotHeight;
        return { x, y };
      });

      const linePoints = points.map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`).join(" ");
      const areaPoints = [
        `${points[0].x.toFixed(1)},${(height - padY).toFixed(1)}`,
        ...points.map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`),
        `${points[points.length - 1].x.toFixed(1)},${(height - padY).toFixed(1)}`,
      ].join(" ");

      svgEl.innerHTML =
        `<polygon class="sparkline-fill" points="${areaPoints}" />` +
        `<polyline points="${linePoints}" />`;
      svgEl.title = "Last 60s: " + min.toFixed(1) + "–" + max.toFixed(1) + " Mbps";
    }

    function formatMbps(value) {
      if (!value || value <= 0) return "—";
      return value.toFixed(1) + " Mbps";
    }

    function formatMs(value) {
      if (!value || value <= 0) return "—";
      return Math.round(value) + " ms";
    }

    function stateLabel(state) {
      if (!state) return "Unknown";
      return state.charAt(0).toUpperCase() + state.slice(1);
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.add("visible");
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function formatResolution(input) {
      if (!input || !input.video_width || !input.video_height) return "—";
      return input.video_width + "×" + input.video_height;
    }

    function formatFPS(value) {
      if (!value || value <= 0) return "—";
      const rounded = Math.round(value * 100) / 100;
      return rounded + " fps";
    }

    function showPreviewPlaceholder(message) {
      inputPreviewEl.classList.remove("has-image");
      inputPreviewPlaceholderEl.textContent = message;
    }

    function loadSnapshot() {
      snapshotVersion += 1;
      const url = "/api/input/snapshot.jpg?v=" + snapshotVersion;
      const hadImage = inputPreviewEl.classList.contains("has-image");

      if (!hadImage) {
        showPreviewPlaceholder("Unavailable");
      }

      const probe = new Image();
      probe.decoding = "async";
      probe.onload = () => {
        inputSnapshotEl.src = url;
        inputPreviewEl.classList.add("has-image");
      };
      probe.onerror = () => {
        inputSnapshotEl.removeAttribute("src");
        showPreviewPlaceholder("Unavailable");
      };
      probe.src = url;
    }

    function recordBitrateSample(input) {
      const now = Date.now();
      let mbps = 0;

      if (input && input.online) {
        if (input.bitrate_mbps > 0) {
          mbps = input.bitrate_mbps;
        } else if (input.inbound_bytes > 0 && lastInboundBytes !== null && lastInboundAt !== null) {
          const dt = (now - lastInboundAt) / 1000;
          if (dt > 0) {
            const delta = input.inbound_bytes - lastInboundBytes;
            if (delta >= 0) {
              mbps = (delta * 8) / (dt * 1_000_000);
            }
          }
        }

        if (input.inbound_bytes > 0) {
          lastInboundBytes = input.inbound_bytes;
          lastInboundAt = now;
        }
      } else {
        lastInboundBytes = null;
        lastInboundAt = null;
      }

      if (mbps > 0) {
        bitrateSamples.push({ t: now, v: mbps });
      }

      pruneSamples(bitrateSamples, now);
    }

    function recordOutputBitrateSamples(statuses) {
      const now = Date.now();
      const activeIds = new Set();

      for (const [id, status] of Object.entries(statuses)) {
        activeIds.add(id);
        const mbps = status.progress && status.progress.BitrateKbps > 0
          ? status.progress.BitrateKbps / 1000
          : 0;

        if (status.state === "live" && mbps > 0) {
          if (!outputBitrateSamples[id]) {
            outputBitrateSamples[id] = [];
          }
          outputBitrateSamples[id].push({ t: now, v: mbps });
          pruneSamples(outputBitrateSamples[id], now);
        }
      }

      for (const id of Object.keys(outputBitrateSamples)) {
        if (!activeIds.has(id)) {
          delete outputBitrateSamples[id];
        }
      }
    }

    function currentBitrateMbps(input) {
      if (input && input.bitrate_mbps > 0) {
        return input.bitrate_mbps;
      }
      if (bitrateSamples.length > 0) {
        return bitrateSamples[bitrateSamples.length - 1].v;
      }
      return 0;
    }

    function renderBitrateSparkline(now = Date.now()) {
      renderSparkline(inputBitrateSparklineEl, bitrateSamples, now);
    }

    function renderOutputBitrateSparklines(now = Date.now()) {
      for (const samples of Object.values(outputBitrateSamples)) {
        pruneSamples(samples, now);
      }

      outputsEl.querySelectorAll(".output-sparkline").forEach((svgEl) => {
        const samples = outputBitrateSamples[svgEl.dataset.outputId] || [];
        renderSparkline(svgEl, samples, now);
      });
    }

    function formatSRTBuffer(input) {
      if (!input || !input.online || input.receive_buffer_ms <= 0) {
        return "—";
      }
      const bufferMs = input.receive_buffer_ms;
      const latencyMs = input.receive_latency_ms;
      if (latencyMs > 0) {
        return bufferMs + " / " + latencyMs + " ms";
      }
      return formatMs(bufferMs);
    }

    function renderSRTBufferFill(input) {
      inputSrtBufferFillEl.className = "srt-buffer-fill";
      inputSrtBufferFillEl.style.width = "0";

      if (!input || !input.online || input.receive_buffer_ms <= 0 || input.receive_latency_ms <= 0) {
        return;
      }

      const ratio = input.receive_buffer_ms / input.receive_latency_ms;
      inputSrtBufferFillEl.style.width = Math.min(100, ratio * 100).toFixed(1) + "%";
      if (ratio < 0.15) {
        inputSrtBufferFillEl.classList.add("low");
      } else if (ratio > 0.9) {
        inputSrtBufferFillEl.classList.add("high");
      }
    }

    function recordSrtPacketSample(input) {
      const now = Date.now();

      if (!input || !input.online || input.protocol !== "SRT") {
        lastSrtPackets = null;
        return;
      }

      const current = {
        loss: input.packets_received_loss || 0,
        retrans: input.packets_retrans || 0,
        dropped: input.packets_dropped || 0,
      };

      if (lastSrtPackets !== null) {
        const delta = {
          t: now,
          loss: Math.max(0, current.loss - lastSrtPackets.loss),
          retrans: Math.max(0, current.retrans - lastSrtPackets.retrans),
          dropped: Math.max(0, current.dropped - lastSrtPackets.dropped),
        };
        if (delta.loss > 0 || delta.retrans > 0 || delta.dropped > 0) {
          srtPacketSamples.push(delta);
        }
      }

      lastSrtPackets = current;
      pruneSamples(srtPacketSamples, now);
    }

    function srtPacketWindowTotals(now = Date.now()) {
      const cutoff = now - BITRATE_WINDOW_MS;
      return srtPacketSamples.reduce(
        (totals, sample) => {
          if (sample.t < cutoff) {
            return totals;
          }
          totals.loss += sample.loss;
          totals.retrans += sample.retrans;
          totals.dropped += sample.dropped;
          return totals;
        },
        { loss: 0, retrans: 0, dropped: 0 },
      );
    }

    function renderSRTPackets(input) {
      if (!input || !input.online || input.protocol !== "SRT") {
        inputSrtPacketsEl.innerHTML = "SRT packets (60s): <strong>—</strong>";
        return;
      }

      const totals = srtPacketWindowTotals();
      inputSrtPacketsEl.innerHTML =
        "SRT packets (60s): <strong>" +
        totals.loss + " loss · " + totals.retrans + " retrans · " + totals.dropped + " dropped</strong>";
    }

    function renderInput(input) {
      lastInput = input || null;
      const online = input && input.online;
      const isSRT = input && input.protocol === "SRT";
      recordBitrateSample(input);
      inputStatusEl.className = "pill " + (online ? "online" : "offline");
      inputStatusEl.lastChild.textContent = online ? "Online" : "Offline";
      inputProtocolEl.innerHTML = "Protocol: <strong>" + escapeHtml((input && input.protocol) || "—") + "</strong>";
      inputSourceEl.innerHTML = "Source: <strong>" + escapeHtml((input && (input.source_ip || input.remote_addr)) || "—") + "</strong>";
      inputResolutionEl.innerHTML = "Resolution: <strong>" + escapeHtml(formatResolution(input)) + "</strong>";
      inputFpsEl.innerHTML = "Framerate: <strong>" + escapeHtml(formatFPS(input && input.video_fps)) + "</strong>";
      inputBitrateEl.querySelector("strong").textContent = formatMbps(currentBitrateMbps(input));
      renderBitrateSparkline();
      inputRttEl.innerHTML = "RTT: <strong>" + formatMs(input && input.rtt_ms) + "</strong>";

      inputSrtRowEl.hidden = !isSRT;
      if (isSRT) {
        inputSrtBufferEl.querySelector("strong").textContent = formatSRTBuffer(input);
        renderSRTBufferFill(input);
        recordSrtPacketSample(input);
        renderSRTPackets(input);
      } else {
        recordSrtPacketSample(input);
      }

      inputPreviewEl.classList.toggle("offline", !online);
      if (online) {
        loadSnapshot();
      } else if (!inputPreviewEl.classList.contains("has-image")) {
        showPreviewPlaceholder("Waiting for input");
      }
    }

    function fieldValue(id, field, serverValue) {
      if (drafts[id] && drafts[id][field] !== undefined) {
        return drafts[id][field];
      }
      const el = document.getElementById("field-" + field + "-" + id);
      if (el && (editing.has(id + ":" + field) || document.activeElement === el)) {
        return el.value;
      }
      return serverValue || "";
    }

    function effectiveConfig(id) {
      const config = outputConfigs[id] || {};
      return {
        url: fieldValue(id, "url", config.url),
        stream_key: fieldValue(id, "stream_key", config.stream_key),
      };
    }

    function isDirty(id) {
      const config = outputConfigs[id];
      if (!config) return false;
      const current = effectiveConfig(id);
      return current.url.trim() !== (config.url || "")
        || current.stream_key !== (config.stream_key || "");
    }

    function renderOutputs() {
      const ids = Object.keys(outputConfigs).sort();
      if (ids.length === 0) {
        outputsEl.innerHTML = '<li class="empty">No outputs configured.</li>';
        return;
      }

      outputsEl.innerHTML = ids.map((id) => {
        const config = outputConfigs[id];
        const status = statusById[id] || {};
        const state = status.state || "idle";
        const samples = outputBitrateSamples[id] || [];
        const mbps = status.progress && status.progress.BitrateKbps > 0
          ? status.progress.BitrateKbps / 1000
          : 0;
        const displayMbps = mbps > 0 ? mbps : (samples.at(-1)?.v || 0);
        const showBitrate = state === "live" || samples.length > 0;
        const bitrate = showBitrate
          ? `<span class="bitrate-stat">${formatMbps(displayMbps)}<svg class="sparkline output-sparkline" data-output-id="${escapeHtml(id)}" width="88" height="22" viewBox="0 0 88 22" aria-hidden="true"></svg></span>`
          : "";
        const error = status.last_error
          ? `<div class="output-error">${escapeHtml(status.last_error)}</div>`
          : "";
        const url = escapeHtml(fieldValue(id, "url", config.url));
        const streamKey = escapeHtml(fieldValue(id, "stream_key", config.stream_key));
        const dirty = isDirty(id);
        const busy = pending.has(id);
        const keyVisible = visibleKeys.has(id);

        return `
          <li class="output" data-id="${escapeHtml(id)}">
            <div class="output-header">
              <div class="output-info">
                <p class="output-title">${escapeHtml(config.label || id)}</p>
                <div class="output-meta">
                  <span class="pill ${escapeHtml(state)}"><span class="dot"></span><span>${escapeHtml(stateLabel(state))}</span></span>
                  ${bitrate ? bitrate : ""}
                  ${status.restart_count ? `<span>Restarts: ${status.restart_count}</span>` : ""}
                </div>
                ${error}
              </div>
              <label class="toggle" title="${config.enabled ? "Disable" : "Enable"} ${escapeHtml(config.label || id)}">
                <input
                  type="checkbox"
                  ${config.enabled ? "checked" : ""}
                  ${busy ? "disabled" : ""}
                  data-id="${escapeHtml(id)}"
                  data-action="toggle"
                  aria-label="Toggle ${escapeHtml(config.label || id)}"
                >
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="output-fields">
              <div class="field">
                <label for="field-url-${escapeHtml(id)}">URL</label>
                <input
                  id="field-url-${escapeHtml(id)}"
                  type="url"
                  value="${url}"
                  placeholder="rtmp://..."
                  autocomplete="off"
                  ${busy ? "disabled" : ""}
                  data-id="${escapeHtml(id)}"
                  data-field="url"
                >
              </div>
              <div class="field">
                <label for="field-stream_key-${escapeHtml(id)}">Stream key</label>
                <div class="field-key-row">
                  <input
                    id="field-stream_key-${escapeHtml(id)}"
                    type="${keyVisible ? "text" : "password"}"
                    value="${streamKey}"
                    placeholder="Stream key"
                    autocomplete="off"
                    ${busy ? "disabled" : ""}
                    data-id="${escapeHtml(id)}"
                    data-field="stream_key"
                  >
                  <button
                    type="button"
                    class="btn btn-small"
                    data-id="${escapeHtml(id)}"
                    data-action="toggle-key"
                    ${busy ? "disabled" : ""}
                  >${keyVisible ? "Hide key" : "Show key"}</button>
                </div>
              </div>
            </div>
            <div class="output-actions">
              <button
                type="button"
                class="btn"
                data-id="${escapeHtml(id)}"
                data-action="save"
                ${busy || !dirty ? "disabled" : ""}
              >Save</button>
            </div>
          </li>
        `;
      }).join("");

      renderOutputBitrateSparklines();

      outputsEl.querySelectorAll("[data-action='toggle']").forEach((input) => {
        input.addEventListener("change", () => toggleOutput(input));
      });

      outputsEl.querySelectorAll("[data-action='save']").forEach((button) => {
        button.addEventListener("click", () => saveOutput(button.dataset.id));
      });

      outputsEl.querySelectorAll("[data-action='toggle-key']").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.id;
          if (visibleKeys.has(id)) {
            visibleKeys.delete(id);
          } else {
            visibleKeys.add(id);
          }
          renderOutputs();
        });
      });

      outputsEl.querySelectorAll(".output-fields input").forEach((input) => {
        const key = input.dataset.id + ":" + input.dataset.field;
        input.addEventListener("focus", () => editing.add(key));
        input.addEventListener("blur", () => editing.delete(key));
        input.addEventListener("input", () => {
          drafts[input.dataset.id] = drafts[input.dataset.id] || {};
          drafts[input.dataset.id][input.dataset.field] = input.value;
          const saveBtn = outputsEl.querySelector(`button[data-action='save'][data-id="${input.dataset.id}"]`);
          if (saveBtn) {
            saveBtn.disabled = pending.has(input.dataset.id) || !isDirty(input.dataset.id);
          }
        });
      });
    }

    async function refresh() {
      try {
        const [statusRes, outputsRes] = await Promise.all([
          fetch("/api/status", { cache: "no-store" }),
          fetch("/api/outputs", { cache: "no-store" }),
        ]);
        if (!statusRes.ok) throw new Error("Status request failed (" + statusRes.status + ")");
        if (!outputsRes.ok) throw new Error("Outputs request failed (" + outputsRes.status + ")");
        const status = await statusRes.json();
        const outputs = await outputsRes.json();
        clearError();
        renderInput(status.input);
        outputConfigs = Object.fromEntries(outputs.map((out) => [out.id, out]));
        statusById = Object.fromEntries((status.outputs || []).map((out) => [out.id, out]));
        recordOutputBitrateSamples(statusById);
        renderOutputs();
        updatedEl.textContent = "Updated " + new Date(status.now || Date.now()).toLocaleTimeString();
      } catch (err) {
        showError(err.message || "Failed to load status");
        updatedEl.textContent = "Update failed";
      }
    }

    async function updateOutput(id, patch) {
      pending.add(id);
      renderOutputs();
      clearError();

      try {
        const res = await fetch("/api/outputs/" + encodeURIComponent(id), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(patch),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(body.error || "Update failed (" + res.status + ")");
        }
        delete drafts[id];
        outputConfigs[id] = body;
        pending.delete(id);
        await refresh();
        return body;
      } catch (err) {
        pending.delete(id);
        renderOutputs();
        throw err;
      }
    }

    async function toggleOutput(input) {
      const id = input.dataset.id;
      const enabled = input.checked;
      try {
        await updateOutput(id, { enabled });
      } catch (err) {
        showError(err.message || "Failed to update output");
      }
    }

    async function saveOutput(id) {
      const config = outputConfigs[id];
      if (!config) return;

      const current = effectiveConfig(id);
      const url = current.url.trim();
      const streamKey = current.stream_key;
      const patch = {};

      if (url !== (config.url || "")) {
        patch.url = url;
      }
      if (streamKey !== (config.stream_key || "")) {
        patch.stream_key = streamKey;
      }

      if (Object.keys(patch).length === 0) return;

      try {
        await updateOutput(id, patch);
      } catch (err) {
        showError(err.message || "Failed to save output");
      }
    }

    refresh();
    setInterval(refresh, 3000);
    setInterval(() => {
      if (bitrateSamples.length > 0) {
        renderBitrateSparkline();
      }
      renderOutputBitrateSparklines();
      if (lastInput && lastInput.protocol === "SRT" && lastInput.online) {
        pruneSamples(srtPacketSamples);
        renderSRTPackets(lastInput);
      }
    }, 1000);
  </script>
</body>
</html>
